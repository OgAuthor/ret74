meta:
  environment: python
  toolchain:
    name: pip
    version: 3.12

build:
  requirementsPath: requirements.txt
  useCache: true

run:
  command: python3 manage.py migrate && python3 manage.py collectstatic --noinput && gunicorn telemaster74.wsgi:application --bind 0.0.0.0:80
  containerPort: 80
