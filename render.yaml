services:
  - type: web
    name: telemaster74
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn telemaster74.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SITE_DOMAIN
        sync: false
      - key: COMPANY_LEGAL_NAME
        sync: false
      - key: CONTACT_EMAIL
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: MANAGER_NOTIFICATION_EMAILS
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: EMAIL_USE_TLS
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: telemaster74-db
          property: connectionString

databases:
  - name: telemaster74-db
